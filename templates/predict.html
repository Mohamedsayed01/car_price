<!DOCTYPE html>
<html lang="en">
    
8<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<head>
    <meta charset="UTF-8">
    <title>Carvo | Predict Price</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <!-- Navbar -->
<nav class="navbar" id="navbar">
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='caricon.png') }}" alt="Carvo Logo">
            <span>Carvo</span>
        </div>

        <ul class="nav-links">

            <li><a href="/" title="Home"><i class="fa-solid fa-house"></i></a></li>

            {% if logged_in %}
                
                <li><a href="/predict" title="Predict"><i class="fa-solid fa-car"></i></a></li>
                <li><a href="/logout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a></li>

            {% else %}

                <li><a href="/login" title="Login"><i class="fa-solid fa-lock"></i></a></li>
                <li><a href="/register" title="Register"><i class="fa-solid fa-user-plus"></i></a></li>

            {% endif %}

        </ul>
    </div>
</nav>

    <!-- Predict Section -->
    <section class="hero predict-hero">
        <div class="overlay"></div>
        <div class="predict-container">

            <h1>Enter Car Details</h1>
            <p>Fill the form below to get an instant price estimation</p>

            <form method="POST" class="predict-form">

                <div class="form-group">
                    <label>Year</label>
                    <input type="number" name="year" placeholder="e.g. 2016" required>
                </div>

                <div class="form-group">
                    <label>Kilometers Driven</label>
                    <input type="number" name="km_driven" placeholder="e.g. 45000" required>
                </div>

                <div class="form-group">
                    <label>Fuel Type</label>
                    <select name="fuel" required>
                        <option value="0">Petrol</option>
                        <option value="1">Diesel</option>
                        <option value="2">CNG</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Transmission</label>
                    <select name="transmission" required>
                        <option value="0">Manual</option>
                        <option value="1">Automatic</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Owner</label>
                    <select name="owner" required>
                        <option value="0">First Owner</option>
                        <option value="1">Second Owner</option>
                        <option value="2">Third Owner</option>
                    </select>
                </div>

                <button type="submit" class="btn neon-btn">Predict Price</button>

            </form>

        </div>
    </section>

    <footer>
        <p>© 2026 Carvo | Developed by Mohamed Sayed</p>
    </footer>

</body>

</html>
