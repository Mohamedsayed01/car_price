<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carvo | Edit Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='caricon.png') }}" alt="Carvo Logo">
            <span>Carvo</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" title="Home"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="/predict" title="Predict"><i class="fa-solid fa-car"></i></a></li>
            <li><a href="/profile" title="Profile"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="/logout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a></li>
        </ul>
    </div>
</nav>

<section class="auth-section" style="padding-top: 120px;">
    <div class="auth-box" style="max-width: 500px;">
        <h2>Edit Profile</h2>
        <p style="color: #ccc; margin-bottom: 30px;">Update your personal information</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="auth-msg" style="color: {% if category == 'error' %}#ff4444{% else %}#44ff44{% endif %}; margin-bottom: 20px;">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" novalidate>
            <div class="form-group">
                <label for="full_name"><i class="fas fa-user"></i> Full Name</label>
                <input type="text" id="full_name" name="full_name" value="{{ profile.full_name }}" required autocomplete="name">
            </div>

            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" value="{{ profile.email }}" required autocomplete="email">
            </div>

            <div class="form-group">
                <label for="new_password"><i class="fas fa-lock"></i> New Password (optional)</label>
                <input type="password" id="new_password" name="new_password" placeholder="Leave blank if not changing" minlength="8" autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" minlength="8" autocomplete="new-password">
            </div>

            <button type="submit" class="btn neon-btn" style="width: 100%; padding: 14px;">
                Save Changes
            </button>
        </form>

        <p style="margin-top: 25px; text-align: center;">
            <a href="/profile" style="color: #ffcc00;">Back to Profile</a>
        </p>
    </div>
</section>

<footer>
    <p>© 2026 Carvo | Developed by Mohamed Sayed</p>
</footer>

<script>
    window.addEventListener("scroll", function () {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 50) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
    });
</script>

</body>
</html>
