<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carvo | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='caricon.png') }}" alt="Carvo Logo">
            <span>Carvo</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" title="Home"><i class="fa-solid fa-house"></i></a></li>
        </ul>
    </div>
</nav>

<section class="auth-section">
    <div class="auth-box">
        <h2>Reset Your Password</h2>
        <p style="color: #ccc; margin: 15px 0 30px; font-size: 15px;">
            Enter your new password below
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="auth-msg" style="color: {% if category == 'error' %}#ff4444{% else %}#44ff44{% endif %}; margin-bottom: 20px;">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" novalidate>
            <div class="form-group">
                <label for="new_password"><i class="fas fa-lock"></i> New Password</label>
                <input type="password" id="new_password" name="new_password" placeholder="New password" required minlength="8">
            </div>

            <div class="form-group">
                <label for="confirm_password"><i class="fas fa-lock"></i> Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required minlength="8">
            </div>

            <button type="submit" class="btn neon-btn" style="width: 100%; padding: 14px;">
                Reset Password
            </button>
        </form>
    </div>
</section>

<footer>
    <p>© 2026 Carvo | Developed by Mohamed Sayed</p>
</footer>

<script>
    window.addEventListener("scroll", function () {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 50) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
    });
</script>

</body>
</html>
