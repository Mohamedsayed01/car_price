<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carvo | Prediction Result</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar" id="navbar">
    <div class="container">
        <div class="logo">
            <img src="{{ url_for('static', filename='caricon.png') }}" alt="Carvo Logo">
            <span>Carvo</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" title="Home"><i class="fa-solid fa-house"></i></a></li>
            <li><a href="/predict" title="Predict Again"><i class="fa-solid fa-car"></i></a></li>
            <li><a href="/profile" title="Profile"><i class="fa-solid fa-user"></i></a></li>
            <li><a href="/logout" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></a></li>
        </ul>
    </div>
</nav>

<section class="result-section">
    <div class="result-box">
        <h2>Estimated Car Price</h2>
        <h1 style="color: #ffcc00;">${{ price }}</h1>
        <p class="result-desc">
            This is an AI-based estimation of your car's market value.
        </p>
        <a href="/predict" class="btn neon-btn">Predict Another Car</a>
    </div>
</section>

<footer>
    <p>© 2026 Carvo | Developed by Mohamed Sayed</p>
</footer>

<script>
    window.addEventListener("scroll", function () {
        const nav = document.getElementById("navbar");
        if (window.scrollY > 50) nav.classList.add("scrolled");
        else nav.classList.remove("scrolled");
    });
</script>

</body>
</html>
